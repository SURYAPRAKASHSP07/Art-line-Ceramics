<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tile Visualizer</title>

    <style>
      :root {
        --primary: #7209b7;
        --secondary: #b984db;
        --bg: #f6f3fb;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          Segoe UI,
          sans-serif;
      }

      body {
        background: var(--bg);
        color: #333;
      }

      /* HEADER */

      header {
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        color: white;
        padding: 18px;
        text-align: center;
        font-size: 22px;
        font-weight: 600;
      }

      /* WRAPPER */

      .wrapper {
        max-width: 1200px;
        margin: auto;
        padding: 20px;
      }

      /* ROOM GALLERY */

      #gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        margin-top: 25px;
      }

      .thumb {
        width: 100%;
        height: 220px;
        border-radius: 12px;
        cursor: pointer;
        object-fit: cover;
        transition: 0.3s;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      }

      .thumb:hover {
        transform: scale(1.05);
      }

      /* VISUALIZER */

      .container {
        position: relative;
        width: 100%;
        max-width: 900px;
        margin: auto;
        aspect-ratio: 4/3;
        background: rgb(0, 0, 0);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        margin-top: 30px;
      }

      /* GRID */

      #grid {
        position: absolute;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(5, 1fr);
        left: 0;
        top: 0;
        width: 300px;
        height: 200px;
        z-index: 1;
        transform-origin: center;
      }

      .cell {
        border: 0.05px solid rgba(255, 255, 255, 0.15);

        background-size: cover;
        background-position: center;
        background-repeat: repeat;
      }

      /* ROOM IMAGE */

      #selectedImg {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 2;
      }

      /* TILE CAROUSEL */

      .carousel-wrapper {
        margin-top: 30px;
      }

      .carousel-title {
        font-weight: 600;
        margin-bottom: 10px;
      }

      .carousel-container {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .carousel {
        display: flex;
        overflow-x: auto;
        gap: 12px;
        padding: 10px;
        scroll-behavior: smooth;
        background: white;
        border-radius: 10px;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
      }

      .tile-thumb {
        width: 110px;
        height: 110px;
        border-radius: 8px;
        cursor: pointer;
        border: 3px solid transparent;
        object-fit: cover;
        transition: 0.3s;
        flex-shrink: 0;
      }

      .tile-thumb:hover {
        border-color: var(--primary);
        transform: scale(1.05);
      }

      /* BUTTONS */

      button {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 14px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: var(--secondary);
      }

      /* CONTROLS */

      .controls {
        margin-top: 35px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      }

      .controls h3 {
        margin-bottom: 20px;
        color: var(--primary);
      }

      .control-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
      }

      .control-group label {
        font-weight: 600;
        margin-bottom: 6px;
      }

      /* MODERN SLIDER */

      input[type="range"] {
        width: 100%;
        height: 6px;
        border-radius: 5px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        outline: none;
      }

      /* slider thumb */

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: white;
        border: 3px solid var(--primary);
        cursor: pointer;
        transition: 0.2s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }

      .back-btn {
        margin-top: 20px;
        background: #444;
      }

      /* RESPONSIVE */

      @media (max-width: 900px) {
        #gallery {
          grid-template-columns: repeat(2, 1fr);
        }

        .thumb {
          height: 200px;
        }
      }

      @media (max-width: 500px) {
        #gallery {
          grid-template-columns: 1fr;
        }

        .thumb {
          height: 190px;
        }

        .tile-thumb {
          width: 85px;
          height: 85px;
        }
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <header>Tile Visualizer</header>

    <div class="wrapper">
      <!-- PAGE 1 -->

      <div id="page1">
        <h2>Select Room</h2>

        <div id="gallery"></div>
      </div>

      <!-- PAGE 2 -->

      <div id="page2" class="hidden">
        <div class="container">
          <div id="grid">
            <script>
              for (let i = 0; i < 20; i++) {
                document.write('<div class="cell"></div>');
              }
            </script>
          </div>

          <img id="selectedImg" />
        </div>

        <!-- TILE CAROUSEL -->

        <div class="carousel-wrapper">
          <div class="carousel-title">Select Tile Design</div>

          <div class="carousel-container">
            <button onclick="scrollTiles(-200)">◀</button>

            <div class="carousel" id="tileCarousel"></div>

            <button onclick="scrollTiles(200)">▶</button>
          </div>
        </div>

        <!-- CONTROLS -->

        <div class="controls">
          <h3>Adjust Tiles</h3>

          <div class="control-grid">
            <div class="control-group">
              <label>Move X</label>
              <input type="range" id="moveX" min="-500" max="500" value="0" />
            </div>

            <div class="control-group">
              <label>Move Y</label>
              <input type="range" id="moveY" min="-500" max="500" value="0" />
            </div>

            <div class="control-group">
              <label>Scale</label>
              <input
                type="range"
                id="scale"
                min="0.2"
                max="3"
                step="0.1"
                value="1"
              />
            </div>

            <div class="control-group">
              <label>Tilt X</label>
              <input type="range" id="tiltX" min="-90" max="90" value="0" />
            </div>

            <div class="control-group">
              <label>Tilt Y</label>
              <input type="range" id="tiltY" min="-90" max="90" value="0" />
            </div>

            <div class="control-group">
              <label>Rotation</label>
              <input type="range" id="rotate" min="-180" max="180" value="0" />
            </div>
          </div>

          <button class="back-btn" onclick="location.reload()">Back</button>
        </div>
      </div>
    </div>

    <script>
      /* ADD ROOM IMAGES */

      const rooms = [
        "room.png",
        "room.png",
        "room.png",
        "room.png",
        "room.png",
      ];

      /* ADD TILE IMAGES */

      const tiles = [
        "Tile Image 1.jpg",
        "Tile Image 2.jpg",
        "Tile Image 3.jpg",
        "Tile Image 4.jpg",
        "Home page img 1.webp",
        "blue-marble-floor-tile-texture-seamless.jpg",
        "Glam Up Your Screen with White Aesthetic Wallpapers.jpg",
        "green-marble-floor-tile-texture-seamless.jpg",
        "Screenshot 2026-03-09 220220.png",
        "bathroom-floor-tiles-png-transparent-png.png",
        "114-herringbone-parquet-pbr-texture-seamless-20251124195346.jpg",
        "112-herringbone-parquet-pbr-texture-seamless.jpg",
        "109-herringbone-parquet-pbr-texture-seamless.jpg",
        "106-decorated-floral-parquet-texture-seamless.jpg",
        "104-decorated-floral-parquet-texture-seamless.jpg",
        "0099-wood-and-marble-parquet-decorated-texture-seamless.jpg",
        "97-decorative-tiles-agata-effect-pbr-texture-seamless.jpg",
        "95-decorative-tiles-agata-effect-pbr-texture-seamless.jpg",
        "15-cobblestone-pavement-pbr-texture-seamless.jpg",
        "12-cobblestone-pavement-pbr-texture-seamless.jpg",
        "11-garage-paving-pbr-texture-seamless.jpg",
      ];

      const gallery = document.getElementById("gallery");
      const tileCarousel = document.getElementById("tileCarousel");

      const page1 = document.getElementById("page1");
      const page2 = document.getElementById("page2");

      const selectedImg = document.getElementById("selectedImg");
      const grid = document.getElementById("grid");

      /* ROOM GALLERY */

      rooms.forEach((src) => {
        const img = document.createElement("img");
        img.src = src;
        img.className = "thumb";

        img.onclick = () => {
          selectedImg.src = src;
          page1.classList.add("hidden");
          page2.classList.remove("hidden");
        };

        gallery.appendChild(img);
      });

      /* APPLY TILE */

      function applyTile(url) {
        const img = new Image();

        img.onload = function () {
          document.querySelectorAll(".cell").forEach((cell) => {
            cell.style.backgroundImage = `url("${url}")`;
          });
        };

        img.src = url;
      }

      /* TILE CAROUSEL */

      tiles.forEach((src) => {
        const img = document.createElement("img");

        img.src = src;
        img.className = "tile-thumb";

        img.onclick = () => applyTile(src);

        tileCarousel.appendChild(img);
      });

      function scrollTiles(value) {
        tileCarousel.scrollLeft += value;
      }

      /* GRID CONTROLS */

      const controls = ["moveX", "moveY", "scale", "tiltX", "tiltY", "rotate"];

      controls.forEach((id) => {
        document.getElementById(id).addEventListener("input", updateGrid);
      });

      function updateGrid() {
        const x = document.getElementById("moveX").value;
        const y = document.getElementById("moveY").value;
        const scale = document.getElementById("scale").value;
        const tiltX = document.getElementById("tiltX").value;
        const tiltY = document.getElementById("tiltY").value;
        const rotate = document.getElementById("rotate").value;

        grid.style.transform = `
translate(${x}px,${y}px)
scale(${scale})
perspective(1000px)
rotateX(${tiltX}deg)
rotateY(${tiltY}deg)
rotateZ(${rotate}deg)
`;
      }
    </script>
  </body>
</html>

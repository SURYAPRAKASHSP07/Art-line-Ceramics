<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tile Visualizer</title>

    <style>
      :root {
        --primary: #7209b7;
        --secondary: #b984db;
        --bg: #f6f3fb;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          Segoe UI,
          sans-serif;
      }

      body {
        background: var(--bg);
      }

      /* HEADER */

      header {
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        color: white;
        padding: 18px;
        text-align: center;
        font-size: 22px;
        font-weight: 600;
      }

      .wrapper {
        max-width: 1200px;
        margin: auto;
        padding: 20px;
      }

      /* ROOM GALLERY */

      #gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        margin-top: 25px;
      }

      /* ROOM CARD */

      .room-card {
        background: white;
        border-radius: 14px;
        overflow: hidden;
        cursor: pointer;

        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);

        transition: 0.3s;
      }

      .room-card:hover {
        transform: translateY(-6px);

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .room-image {
        width: 100%;
        height: 210px;
        object-fit: cover;
      }

      /* ROOM NAME */

      .room-name {
        padding: 12px;

        font-size: 16px;
        font-weight: 600;

        text-align: center;

        color: #333;

        background: #faf7ff;
      }

      /* VISUALIZER */

      .container {
        position: relative;
        max-width: 900px;
        margin: auto;

        aspect-ratio: 4/3;

        background: white;

        border-radius: 12px;

        overflow: hidden;

        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);

        margin-top: 30px;
      }

      #selectedImg {
        position: absolute;

        width: 100%;
        height: 100%;

        object-fit: cover;

        z-index: 2;
      }

      /* GRID */

      #grid {
        position: absolute;

        display: grid;

        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(5, 1fr);

        width: 300px;
        height: 200px;

        z-index: 1;
      }

      .cell {
        border: none;

        background-size: cover;

        background-repeat: repeat;
      }

      /* CAROUSEL */

      .carousel-wrapper {
        margin-top: 30px;
      }

      .carousel-container {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .carousel {
        display: flex;
        overflow-x: auto;
        gap: 12px;
        padding: 10px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);

        /* smooth finger scrolling */
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;

        /* hide scrollbar */
        scrollbar-width: none; /* Firefox */
      }

      .carousel::-webkit-scrollbar {
        display: none; /* Chrome, Edge, Safari */
      }

      .tile-box {
        display: flex;

        flex-direction: column;

        align-items: center;

        padding: 8px;

        border-radius: 10px;

        cursor: pointer;

        transition: 0.3s;
      }

      .tile-thumb {
        width: 110px;

        height: 110px;

        object-fit: cover;

        border-radius: 8px;

        border: 3px solid transparent;
      }

      .tile-name {
        font-size: 13px;

        font-weight: 600;

        text-align: center;
      }

      .tile-box.active {
        background: #f1e6ff;
      }

      .tile-box.active .tile-thumb {
        border-color: var(--primary);
      }

      /* BUTTON */

      button {
        background: var(--primary);

        color: white;

        border: none;

        padding: 10px;

        border-radius: 6px;

        cursor: pointer;
      }

      button:hover {
        background: var(--secondary);
      }

      /* CONTROLS */

      .controls {
        margin-top: 35px;

        background: white;

        padding: 25px;

        border-radius: 12px;

        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      }

      .control-grid {
        display: grid;

        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

        gap: 20px;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>

      <!-- PAGE 1 -->

      <div id="page1">
        <h2>Select Room</h2>

        <div id="gallery"></div>
        <a

            text-decoration: none;
            color: #7209b7;
            background-color: #b984db;
          "
          href="index.html"
          ><button style="margin-top: 20px; font-weight: bold; padding: 15px">
            Back
          </button></a

      </div>

      <!-- PAGE 2 -->

      <div id="page2" class="hidden">
        <div class="container">
          <div id="grid"></div>

          <img id="selectedImg" />
        </div>

        <div class="carousel-wrapper">
          <h3>Select Tile</h3>

          <div style="margin-top: 15px" class="carousel-container">
            <button onclick="scrollTiles(-200)">◀</button>

            <div class="carousel" id="tileCarousel"></div>

            <button onclick="scrollTiles(200)">▶</button>
          </div>
        </div>

        <div class="controls">
          <h3>Adjust Tiles</h3>

          <div style="margin-top: 15px" class="control-grid">
            <input type="range" id="moveX" min="-500" max="500" value="0" />
            <input type="range" id="moveY" min="-500" max="500" value="0" />
            <input
              type="range"
              id="scale"
              min="0.2"
              max="3"
              step="0.1"
              value="1"
            />
            <input type="range" id="tiltX" min="-90" max="90" value="0" />
            <input type="range" id="tiltY" min="-90" max="90" value="0" />
            <input type="range" id="rotate" min="-180" max="180" value="0" />
          </div>

          <button
            style="margin-top: 20px; font-weight: bold; padding: 15px"
            onclick="location.reload()"
          >
            Back
          </button>
        </div>
      </div>
    </div>

      /* ROOM GALLERY */

      rooms.forEach((room) => {
        const card = document.createElement("div");
        card.className = "room-card";

        const img = document.createElement("img");
        img.src = room.image;
        img.className = "room-image";

        const name = document.createElement("div");
        name.className = "room-name";
        name.innerText = room.name;

        card.appendChild(img);
        card.appendChild(name);

        card.onclick = () => {
          selectedImg.src = room.image;

          loadTiles(room.tiles);

          page1.classList.add("hidden");
          page2.classList.remove("hidden");
        };

        gallery.appendChild(card);
      });

      /* LOAD TILES */

      function loadTiles(tileList) {
        tileCarousel.innerHTML = "";

        tileList.forEach((tile) => {
          const box = document.createElement("div");
          box.className = "tile-box";

          const img = document.createElement("img");
          img.src = tile.src;
          img.className = "tile-thumb";

          const name = document.createElement("div");
          name.className = "tile-name";
          name.innerText = tile.name;

          box.appendChild(img);
          box.appendChild(name);

          box.onclick = () => {
            applyTile(tile.src);

            document
              .querySelectorAll(".tile-box")
              .forEach((b) => b.classList.remove("active"));

            box.classList.add("active");
          };

          tileCarousel.appendChild(box);
        });
      }

      function applyTile(url) {
        document.querySelectorAll(".cell").forEach((cell) => {
          cell.style.backgroundImage = `url(${url})`;
        });
      }

      function scrollTiles(v) {
        tileCarousel.scrollLeft += v;
      }

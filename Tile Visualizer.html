<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tile Visualizer</title>

    <style>
      :root {
        --primary: #7209b7;
        --secondary: #b984db;
        --bg: #f6f3fb;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          Segoe UI,
          sans-serif;
      }

      body {
        background: var(--bg);
        color: #333;
      }

      header {
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        color: white;
        padding: 18px;
        text-align: center;
        font-size: 22px;
        font-weight: 600;
      }

      .wrapper {
        max-width: 1200px;
        margin: auto;
        padding: 20px;
      }

      /* ROOM GALLERY */

      #gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        margin-top: 25px;
      }

      .thumb {
        width: 100%;
        height: 220px;
        border-radius: 12px;
        cursor: pointer;
        object-fit: cover;
        transition: 0.3s;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      }

      .thumb:hover {
        transform: scale(1.05);
      }

      /* VISUALIZER */

      .container {
        position: relative;
        width: 100%;
        max-width: 900px;
        margin: auto;
        aspect-ratio: 4/3;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        margin-top: 30px;
      }

      /* GRID */

      #grid {
        position: absolute;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(5, 1fr);
        left: 0;
        top: 0;
        width: 300px;
        height: 200px;
        z-index: 1;
        transform-origin: center;
      }

      .cell {
        border: none;
        background-size: cover;
        background-position: center;
        background-repeat: repeat;
      }

      /* ROOM IMAGE */

      #selectedImg {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 2;
      }

      /* TILE CAROUSEL */

      .carousel-wrapper {
        margin-top: 30px;
      }

      .carousel-title {
        font-weight: 600;
        margin-bottom: 10px;
      }

      .carousel-container {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .carousel {
        display: flex;
        overflow-x: auto;
        gap: 12px;
        padding: 10px;
        scroll-behavior: smooth;
        background: white;
        border-radius: 10px;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
      }

      /* TILE BOX */

      .tile-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 8px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
      }

      /* TILE IMAGE */

      .tile-thumb {
        width: 110px;
        height: 110px;
        object-fit: cover;
        border-radius: 8px;
        border: 3px solid transparent;
      }

      /* TILE NAME */

      .tile-name {
        font-size: 13px;
        font-weight: 600;
        text-align: center;
      }

      /* ACTIVE TILE */

      .tile-box.active {
        background: #f1e6ff;
      }

      .tile-box.active .tile-thumb {
        border-color: var(--primary);
      }

      /* BUTTONS */

      button {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 14px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: var(--secondary);
      }

      /* CONTROLS */

      .controls {
        margin-top: 35px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      }

      .controls h3 {
        margin-bottom: 20px;
        color: var(--primary);
      }

      .control-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
      }

      .control-group label {
        font-weight: 600;
        margin-bottom: 6px;
      }

      /* SLIDERS */

      input[type="range"] {
        width: 100%;
        height: 6px;
        border-radius: 5px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: white;
        border: 3px solid var(--primary);
        cursor: pointer;
      }

      .back-btn {
        margin-top: 20px;
        background: #444;
      }

      /* RESPONSIVE */

      @media (max-width: 900px) {
        #gallery {
          grid-template-columns: repeat(2, 1fr);
        }

        .thumb {
          height: 200px;
        }
      }

      @media (max-width: 500px) {
        #gallery {
          grid-template-columns: 1fr;
        }

        .thumb {
          height: 190px;
        }

        .tile-thumb {
          width: 85px;
          height: 85px;
        }
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <header>Tile Visualizer</header>

    <div class="wrapper">
      <!-- PAGE 1 -->

      <div id="page1">
        <h2>Select Room</h2>

        <div id="gallery"></div>
      </div>

      <!-- PAGE 2 -->

      <div id="page2" class="hidden">
        <div class="container">
          <div id="grid"></div>

          <img id="selectedImg" />
        </div>

        <!-- TILE CAROUSEL -->

        <div class="carousel-wrapper">
          <div class="carousel-title">Select Tile Design</div>

          <div class="carousel-container">
            <button onclick="scrollTiles(-200)">◀</button>

            <div class="carousel" id="tileCarousel"></div>

            <button onclick="scrollTiles(200)">▶</button>
          </div>
        </div>

        <!-- CONTROLS -->

        <div class="controls">
          <h3>Adjust Tiles</h3>

          <div class="control-grid">
            <div class="control-group">
              <label>Move X</label>
              <input type="range" id="moveX" min="-500" max="500" value="0" />
            </div>

            <div class="control-group">
              <label>Move Y</label>
              <input type="range" id="moveY" min="-500" max="500" value="0" />
            </div>

            <div class="control-group">
              <label>Scale</label>
              <input
                type="range"
                id="scale"
                min="0.2"
                max="3"
                step="0.1"
                value="1"
              />
            </div>

            <div class="control-group">
              <label>Tilt X</label>
              <input type="range" id="tiltX" min="-90" max="90" value="0" />
            </div>

            <div class="control-group">
              <label>Tilt Y</label>
              <input type="range" id="tiltY" min="-90" max="90" value="0" />
            </div>

            <div class="control-group">
              <label>Rotation</label>
              <input type="range" id="rotate" min="-180" max="180" value="0" />
            </div>
          </div>

          <button class="back-btn" onclick="location.reload()">Back</button>
        </div>
      </div>
    </div>

    <script>
      /* GRID CELLS */

      const grid = document.getElementById("grid");

      for (let i = 0; i < 20; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";

        grid.appendChild(cell);
      }

      /* ROOM IMAGES */

      const rooms = ["room.png", "room.png", "room.png", "room.png"];

      /* TILE IMAGES WITH NAMES */

      const tiles = [
        { name: "Tile 1", src: "Tile Image 1.jpg" },
        { name: "Tile 2", src: "Tile Image 2.jpg" },
        { name: "Tile 3", src: "Tile Image 3.jpg" },
        { name: "Tile 4", src: "Tile Image 4.jpg" },
        { name: "Tile 5", src: "Home page img 1.webp" },
        { name: "Tile 6", src: "blue-marble-floor-tile-texture-seamless.jpg" },
        {
          name: "Tile 7",
          src: "Glam Up Your Screen with White Aesthetic Wallpapers.jpg",
        },
        { name: "Tile 8", src: "green-marble-floor-tile-texture-seamless.jpg" },
        { name: "Tile 9", src: "Screenshot 2026-03-09 220220.png" },
        {
          name: "Tile 10",
          src: "bathroom-floor-tiles-png-transparent-png.png",
        },
        {
          name: "Tile 11",
          src: "114-herringbone-parquet-pbr-texture-seamless-20251124195346.jpg",
        },
        {
          name: "Tile 7",
          src: "112-herringbone-parquet-pbr-texture-seamless.jpg",
        },
        {
          name: "Tile 8",
          src: "109-herringbone-parquet-pbr-texture-seamless.jpg",
        },
        {
          name: "Tile 9",
          src: "106-decorated-floral-parquet-texture-seamless.jpg",
        },
        {
          name: "Tile 10",
          src: "104-decorated-floral-parquet-texture-seamless.jpg",
        },
        {
          name: "Tile 11",
          src: "0099-wood-and-marble-parquet-decorated-texture-seamless.jpg",
        },
        {
          name: "Tile 12",
          src: "97-decorative-tiles-agata-effect-pbr-texture-seamless.jpg",
        },
        {
          name: "Tile 13",
          src: "95-decorative-tiles-agata-effect-pbr-texture-seamless.jpg",
        },
        {
          name: "Tile 14",
          src: "15-cobblestone-pavement-pbr-texture-seamless.jpg",
        },
        {
          name: "Tile 15",
          src: "12-cobblestone-pavement-pbr-texture-seamless.jpg",
        },
        { name: "Tile 16", src: "11-garage-paving-pbr-texture-seamless.jpg" },
      ];

      const gallery = document.getElementById("gallery");
      const tileCarousel = document.getElementById("tileCarousel");

      const page1 = document.getElementById("page1");
      const page2 = document.getElementById("page2");

      const selectedImg = document.getElementById("selectedImg");

      /* ROOM GALLERY */

      rooms.forEach((src) => {
        const img = document.createElement("img");
        img.src = src;
        img.className = "thumb";

        img.onclick = () => {
          selectedImg.src = src;
          page1.classList.add("hidden");
          page2.classList.remove("hidden");
        };

        gallery.appendChild(img);
      });

      /* APPLY TILE */

      function applyTile(url) {
        document.querySelectorAll(".cell").forEach((cell) => {
          cell.style.backgroundImage = `url("${url}")`;
        });
      }

      /* TILE CAROUSEL */

      tiles.forEach((tile) => {
        const box = document.createElement("div");
        box.className = "tile-box";

        const img = document.createElement("img");
        img.src = tile.src;
        img.className = "tile-thumb";

        const name = document.createElement("div");
        name.className = "tile-name";
        name.innerText = tile.name;

        box.appendChild(img);
        box.appendChild(name);

        box.onclick = () => {
          applyTile(tile.src);

          document.querySelectorAll(".tile-box").forEach((b) => {
            b.classList.remove("active");
          });

          box.classList.add("active");
        };

        tileCarousel.appendChild(box);
      });

      function scrollTiles(val) {
        tileCarousel.scrollLeft += val;
      }

      /* CONTROLS */

      const controls = ["moveX", "moveY", "scale", "tiltX", "tiltY", "rotate"];

      controls.forEach((id) => {
        document.getElementById(id).addEventListener("input", updateGrid);
      });

      function updateGrid() {
        const x = document.getElementById("moveX").value;
        const y = document.getElementById("moveY").value;
        const scale = document.getElementById("scale").value;
        const tiltX = document.getElementById("tiltX").value;
        const tiltY = document.getElementById("tiltY").value;
        const rotate = document.getElementById("rotate").value;

        grid.style.transform = `
translate(${x}px,${y}px)
scale(${scale})
perspective(1000px)
rotateX(${tiltX}deg)
rotateY(${tiltY}deg)
rotateZ(${rotate}deg)
`;
      }
    </script>
  </body>
</html>
